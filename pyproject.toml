[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E501"]  # Long Indonesian string literals in mock data cannot be shortened

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
follow_imports = "silent"

[tool.pytest.ini_options]
markers = [
    "requires_api: mark test as requiring Anthropic API key (deselect with -m 'not requires_api')",
]
