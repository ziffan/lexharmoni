name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint-and-test:
    name: Backend — lint, type-check, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt ruff mypy pytest

      - name: Lint (ruff check)
        run: ruff check backend/

      - name: Format check (ruff format)
        run: ruff format --check backend/

      - name: Type check (mypy)
        run: mypy backend/

      - name: Run tests
        # validate_severity_lock.py requires a live server + API key — excluded.
        # No pytest-discoverable test functions exist yet (exit 5 = no tests collected = OK).
        run: |
          python -m pytest tests/ \
            --ignore=tests/validate_severity_lock.py \
            -m "not requires_api" \
            --tb=short -q
          ret=$?
          if [ $ret -ne 0 ] && [ $ret -ne 5 ]; then exit $ret; fi
          if [ $ret -eq 5 ]; then echo "No pytest-discoverable tests collected (expected)."; fi

  frontend-lint-and-build:
    name: Frontend — lint, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Build (Next.js)
        run: npm run build

  repo-hygiene:
    name: Repo hygiene — manifest, license headers, links
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate corpus manifest
        run: python scripts/validate_manifest.py

      - name: Check license headers
        run: python scripts/add_license_headers.py --check

      - name: Check markdown links (internal only)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --offline
            --accept 200,429
            --exclude-path frontend/node_modules
            docs/*.md
            *.md
          fail: true
